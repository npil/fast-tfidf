name: Publish to PyPI
"on":
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  ci:
    uses: ./.github/workflows/ci.yaml

  publish:
    needs: ci
    runs-on: ubuntu-latest
    environment: pypi
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
    - name: Set up python
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"
    - name: Install Poetry
      uses: snok/install-poetry@v1
    - name: Build package
      run: poetry build
    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
