name: Build code
on:
  push:
    branches:
    - main
  pull_request:
    branches:
    - main
  workflow_call:

permissions:
  actions: read
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
    - name: Set up python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install Poetry
      uses: snok/install-poetry@v1
    - name: install dependencies
      run: make install
    - name: Lint
      run: make lint
    - name: Test
      run: make test
